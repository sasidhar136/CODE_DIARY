{% extends "base.html" %}

{% block content %}
<div class="main-card">
    <div class="header-section">
        <div class="header-icon">
            <i class="fas fa-user-plus"></i>
        </div>
        <h1>Create Account</h1>
        <p class="subtitle">Join us and start tracking your learning progress</p>
    </div>

    <form action="{{ url_for('auth.signup') }}" method="POST">
        <div class="form-section">
            <label for="username" class="form-label">
                <i class="fas fa-user"></i>
                Username
            </label>
            <input type="text" class="form-control" id="username" name="username" required placeholder="Choose a username">
            
            <label for="email" class="form-label mt-4">
                <i class="fas fa-envelope"></i>
                Email Address
            </label>
            <input type="email" class="form-control" id="email" name="email" required placeholder="Enter your email">
            
            <label for="password" class="form-label mt-4">
                <i class="fas fa-lock"></i>
                Password
            </label>
            <input type="password" class="form-control" id="password" name="password" required placeholder="Create a strong password">
        </div>

        <div class="button-section">
            <button type="submit" class="btn-gradient btn-success w-100" style="justify-content: center;">
                <i class="fas fa-user-check"></i>
                Create Account
            </button>
        </div>
    </form>

    <div class="back-link">
        <p class="mb-0">Already have an account? <a href="{{ url_for('auth.login') }}">Sign In</a></p>
    </div>
</div>
{% endblock %}
