{% extends "base.html" %}

{% block content %}
<div class="main-card">
    <div class="header-section">
        <div class="header-icon">
            <i class="fas fa-sign-in-alt"></i>
        </div>
        <h1>Welcome Back</h1>
        <p class="subtitle">Sign in to your Code Diary to continue your journey</p>
    </div>

    <form action="{{ url_for('auth.login') }}" method="POST">
        <div class="form-section">
            <label for="email" class="form-label">
                <i class="fas fa-envelope"></i>
                Email Address
            </label>
            <input type="email" class="form-control" id="email" name="email" required placeholder="Enter your email">
            
            <label for="password" class="form-label mt-4">
                <i class="fas fa-lock"></i>
                Password
            </label>
            <input type="password" class="form-control" id="password" name="password" required placeholder="Enter your password">
            
            <div class="form-check mt-4" style="text-align: left; opacity: 0.9;">
                <input class="form-check-input" type="checkbox" id="remember_me" name="remember_me">
                <label class="form-check-label" for="remember_me" style="font-weight: 500;">
                    Remember Me
                </label>
            </div>
        </div>

        <div class="button-section">
            <button type="submit" class="btn-gradient w-100" style="justify-content: center;">
                <i class="fas fa-sign-in-alt"></i>
                Sign In
            </button>
        </div>
    </form>

    <div class="back-link">
        <p class="mb-0">Don't have an account? <a href="{{ url_for('auth.signup') }}">Sign Up</a></p>
    </div>
</div>
{% endblock %}
